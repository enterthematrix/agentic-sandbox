name: MCP server
version: 0.0.1
schema: v1
  # --- MCP SERVERS ---
mcpServers:
- name: "filesystem"
  command: "npx"
  args:
    - "-y"
    - "@modelcontextprotocol/server-filesystem"
    - "/Users/sanjeev.chauhan/workspace/"
- name: "time"
  command: "docker"
  args:
    - "run"
    - "-i"
    - "--rm"
    - "-e"
    - "LOCAL_TIMEZONE=${TZ:-Pacific/Auckland}"
    - "mcp/time"

  env:
    # Some MCP servers require specific paths to be passed as env vars
    PATH: ${PATH}