name: MCP server
version: 0.0.1
schema: v1
  # --- MCP SERVERS ---
mcpServers:
- name: Browser search
  command: "npx"
  args:
    - "@playwright/mcp@latest"

- name: "github"
  command: "npx"
  args:
    - "-y"
    - "@modelcontextprotocol/server-github"
  env:
    GITHUB_PERSONAL_ACCESS_TOKEN: ${{ secrets.GITHUB_PERSONAL_ACCESS_TOKEN }}

- name: "time"
  command: "docker"
  args:
    - "run"
    - "-i"
    - "--rm"
    - "-e"
    - "LOCAL_TIMEZONE=${TZ:-Pacific/Auckland}"
    - "mcp/time"

- name: "filesystem"
  command: "npx"
  args:
    - "-y"
    - "@modelcontextprotocol/server-filesystem"
    - "/Users/sanjeev.chauhan/workspace/"
  env:
    OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
    GITHUB_PERSONAL_ACCESS_TOKEN: ${{ secrets.GITHUB_PERSONAL_ACCESS_TOKEN }}
    PATH: ${PATH}